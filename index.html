<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shootDaHoop</title>
    <!-- Link previews (chat apps fetch these). The description is the
         STATIC fallback; a shared link carries ?need=&hoop= and the
         serving layer rewrites it via shared/shareMeta.ts (dev: the
         vite.config.ts plugin; a future production HTTP layer must call
         the same helper). -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="shootDaHoop - Your daily provider of Hoop related activities"
    />
    <meta property="og:description" content="Come and Shoot Some Hoop!" />
    <meta name="twitter:card" content="summary" />
    <!-- the tab icon: a basketball emoji rendered as an inline SVG -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%8F%80</text></svg>"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="game-wrap">
        <div id="game-container"></div>

        <!-- HUD overlays (inside the game viewport) -->
        <button id="share-btn" type="button" hidden>🏀 SHARE</button>

        <div id="ball-slots">
          <div class="slot"><div class="ball"></div></div>
          <div class="slot"><div class="ball"></div></div>
          <div class="slot"><div class="ball"></div></div>
          <div class="slot"><div class="ball"></div></div>
          <div class="slot"><div class="ball"></div></div>
          <!-- covers the (grayed) row while out of balls: time to refill -->
          <div id="ball-timer" hidden></div>
          <!-- out-of-balls hint: hover for when the balls come back -->
          <button id="ball-hint" type="button" hidden aria-label="When do my balls come back?">
            ?<span id="ball-hint-tip"></span>
          </button>
        </div>

        <div id="chat-wrap">
          <div id="chat-field">
            <input
              id="chat-input"
              type="text"
              maxlength="1000"
              autocomplete="off"
              placeholder="Press Enter to chat…"
            />
            <button id="emoji-btn" type="button" tabindex="-1">🙂</button>
            <div id="emoji-pop" hidden></div>
          </div>
          <button id="chat-send" type="button">Send</button>
        </div>

        <button id="settings-btn" type="button" title="Settings">⚙️</button>
      </div>

      <!-- The court "wall": right 30%, full height -->
      <div id="log-panel">
        <div id="log-header">
          <span>- COURT WALL -</span>
          <button id="log-filter-btn" type="button" title="Filter wall entries">▾</button>
          <div id="log-filter-pop" hidden>
            <label><input type="checkbox" id="filter-miss" /> Ball misses</label>
            <label><input type="checkbox" id="filter-presence" /> Connection events</label>
          </div>
        </div>
        <div id="log-feed"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
